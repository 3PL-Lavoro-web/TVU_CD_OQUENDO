<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TVU · CD Oquendo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#0d1524;
    --panel:#141f33;
    --panel-2:#1b2946;
    --line:#26375c;
    --text:#e8eefb;
    --muted:#8ea3c8;
    --amber:#ffb02e;
    --green:#2fd276;
    --green-bg:#0f3524;
    --red:#ff5c5c;
    --red-bg:#3a1420;
    --blue:#4da3ff;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--ink);color:var(--text);
    min-height:100vh;padding-bottom:40px;
  }
  .num{font-variant-numeric:tabular-nums;font-family:"SF Mono",Consolas,"Roboto Mono",monospace}

  header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg,#0d1524 70%,rgba(13,21,36,.92));
    padding:14px 16px 10px;border-bottom:1px solid var(--line);
    backdrop-filter:blur(6px);
  }
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand h1{font-size:1.05rem;font-weight:800;letter-spacing:.5px}
  .brand h1 span{color:var(--amber)}
  .brand small{color:var(--muted);font-size:.72rem;letter-spacing:.8px;text-transform:uppercase}
  .status-line{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:.72rem;color:var(--muted)}
  .status-line button{
    background:none;border:1px solid var(--line);color:var(--blue);
    border-radius:8px;padding:3px 10px;font-size:.72rem;cursor:pointer;
  }

  main{max-width:560px;margin:0 auto;padding:16px}

  .search-box{position:relative}
  .search-box input{
    width:100%;padding:15px 16px 15px 44px;font-size:1.05rem;
    background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);
    color:var(--text);outline:none;
  }
  .search-box input:focus{border-color:var(--amber)}
  .search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem}
  .suggestions{
    position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    max-height:260px;overflow-y:auto;display:none;
  }
  .suggestions.open{display:block}
  .suggestions button{
    display:block;width:100%;text-align:left;padding:12px 14px;
    background:none;border:none;border-bottom:1px solid var(--line);
    color:var(--text);font-size:.9rem;cursor:pointer;
  }
  .suggestions button:last-child{border-bottom:none}
  .suggestions button:active{background:var(--panel)}
  .suggestions .sku{color:var(--amber);font-weight:700;margin-right:8px}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-top:16px;
  }
  .card h2{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}

  .prod-sku{font-size:1.4rem;font-weight:800;color:var(--amber)}
  .prod-desc{font-size:.95rem;color:var(--text);margin-top:4px;line-height:1.35}
  .prod-meta{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .chip{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:8px 12px;font-size:.78rem;color:var(--muted)
  }
  .chip b{display:block;font-size:1.05rem;color:var(--text);margin-top:2px}

  .date-row{display:flex;gap:12px;align-items:stretch;margin-top:12px}
  .date-field{flex:1}
  .date-field label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .date-field input{
    width:100%;padding:13px 12px;font-size:1rem;background:var(--panel-2);
    border:1.5px solid var(--line);border-radius:12px;color:var(--text);outline:none;
    color-scheme:dark;
  }
  .date-field input:focus{border-color:var(--amber)}

  .days-left{
    flex:1;border-radius:12px;border:1.5px solid var(--line);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    background:var(--panel-2);padding:8px;
  }
  .days-left .n{font-size:1.9rem;font-weight:800;line-height:1}
  .days-left .l{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:4px;text-align:center}
  .days-left.ok{border-color:var(--green);background:var(--green-bg)}
  .days-left.ok .n{color:var(--green)}
  .days-left.bad{border-color:var(--red);background:var(--red-bg)}
  .days-left.bad .n{color:var(--red)}

  .canal{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:13px 12px;border-bottom:1px solid var(--line);
  }
  .canal:last-child{border-bottom:none}
  .canal .name{font-size:.92rem;font-weight:600;flex:1}
  .canal .req{font-size:.78rem;color:var(--muted);text-align:right}
  .canal .req b{display:block;font-size:1rem;color:var(--text)}
  .badge{
    min-width:86px;text-align:center;padding:7px 10px;border-radius:9px;
    font-size:.72rem;font-weight:800;letter-spacing:.5px;
  }
  .badge.apto{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
  .badge.noapto{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
  .badge.na{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}

  .hint{margin-top:14px;font-size:.8rem;color:var(--muted);text-align:center;line-height:1.5}
  .empty{margin-top:40px;text-align:center;color:var(--muted);font-size:.9rem;line-height:1.6}
  .empty .big{font-size:2rem;margin-bottom:8px}
  .error-bar{
    margin-top:14px;background:var(--red-bg);border:1px solid var(--red);
    color:#ffb3b3;border-radius:12px;padding:12px 14px;font-size:.82rem;display:none
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>TVU <span>· CD OQUENDO</span></h1>
    <small>Lavoro 3PL</small>
  </div>
  <div class="status-line">
    <span id="statusText">Cargando base de datos…</span>
    <button onclick="loadData()">⟳ Actualizar</button>
  </div>
</header>

<main>
  <div class="search-box">
    <span class="icon">⌕</span>
    <input id="searchInput" type="search" inputmode="search" autocomplete="off"
           placeholder="Buscar SKU o descripción…" oninput="onSearch()" onfocus="onSearch()">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="error-bar" id="errorBar"></div>

  <div id="result"></div>

  <div class="empty" id="emptyState">
    <div class="big">📦</div>
    Ingresa un <b>SKU</b> o parte de la descripción<br>
    para consultar los tiempos máximos de despacho<br>por canal de atención.
  </div>
</main>

<script>
/* ============================================================
   CONFIGURACIÓN
   1) Publica tu hoja de Google Sheets como CSV:
      Archivo → Compartir → Publicar en la web → (hoja TVU) → CSV
   2) Pega el enlace generado en SHEET_CSV_URL.
   Estructura esperada de columnas:
      SKU | DESCRIPCION | VIDA_UTIL | <CANAL 1> | <CANAL 2> | ...
   - VIDA_UTIL: vida útil total del producto en días (opcional).
   - Cada columna adicional es un canal; el valor son los DÍAS
     MÍNIMOS de vida útil restante que exige ese canal para
     poder despachar (tiempo máximo de despacho).
   ============================================================ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT0OugMrHaDC_vlC1wBZCb8dRIz37e9wEvzgsVttELug2veY2rRtYiXrDt9dacTYddyc8iv9K37jW_B/pub?gid=0&single=true&output=csv"; // ← pega aquí tu enlace CSV publicado

// Datos de demostración (se usan solo si SHEET_CSV_URL está vacío)
const DEMO_CSV = `SKU,DESCRIPCION,VIDA_UTIL,MODERNO,TRADICIONAL,MAYORISTA,HORECA
1001273,GLORIA LECHE EVAPORADA ENTERA 400G,365,220,150,120,90
1002450,PIL YOGURT FRESA 1L,45,30,21,15,10
1003118,ACEITE PRIMOR CLASICO 900ML,540,320,240,180,150
1004522,ATUN FLORIDA FILETE 170G,1460,900,730,600,365
1005890,GALLETA SODA FIELD 6PACK,240,150,110,90,60`;

let DB = [];          // filas normalizadas
let CHANNELS = [];    // nombres de canales detectados
let current = null;   // producto seleccionado

function norm(s){ return String(s||"").trim().toUpperCase(); }

function parseRows(rows){
  if(!rows.length) return;
  const headers = Object.keys(rows[0]);
  const skuCol  = headers.find(h => norm(h)==="SKU" || norm(h)==="MATERIAL") || headers[0];
  const descCol = headers.find(h => ["DESCRIPCION","DESCRIPCIÓN"].includes(norm(h)));
  const vidaCol = headers.find(h => ["VIDA_UTIL","VIDA UTIL","VIDA ÚTIL"].includes(norm(h)));
  CHANNELS = headers.filter(h => h!==skuCol && h!==descCol && h!==vidaCol && norm(h)!=="");

  DB = rows.filter(r => norm(r[skuCol])!=="").map(r => {
    const canales = {};
    CHANNELS.forEach(c => {
      const v = parseFloat(String(r[c]).replace(",","."));
      canales[c] = isNaN(v) ? null : v;
    });
    return {
      sku: norm(r[skuCol]),
      desc: descCol ? String(r[descCol]).trim() : "",
      vida: vidaCol ? parseFloat(String(r[vidaCol]).replace(",",".")) || null : null,
      canales
    };
  });
}

function loadData(){
  const st = document.getElementById("statusText");
  const err = document.getElementById("errorBar");
  err.style.display = "none";
  st.textContent = "Cargando base de datos…";

  const done = () => {
    st.textContent = `${DB.length} SKUs · ${CHANNELS.length} canales · ${new Date().toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"})}`;
    if(current){ const p = DB.find(x=>x.sku===current.sku); if(p){ current=p; render(); } }
  };

  if(!SHEET_CSV_URL){
    parseRows(Papa.parse(DEMO_CSV,{header:true,skipEmptyLines:true}).data);
    done();
    st.textContent += " · DATOS DEMO";
    return;
  }
  Papa.parse(SHEET_CSV_URL + (SHEET_CSV_URL.includes("?")?"&":"?") + "t=" + Date.now(), {
    download:true, header:true, skipEmptyLines:true,
    complete: res => { parseRows(res.data); done(); },
    error: () => {
      st.textContent = "Sin conexión con la base";
      err.textContent = "No se pudo cargar la hoja de Google Sheets. Verifica que esté publicada en la web como CSV y que tengas conexión.";
      err.style.display = "block";
    }
  });
}

function onSearch(){
  const q = norm(document.getElementById("searchInput").value);
  const box = document.getElementById("suggestions");
  if(q.length < 2){ box.classList.remove("open"); return; }
  const hits = DB.filter(p => p.sku.includes(q) || norm(p.desc).includes(q)).slice(0,12);
  if(!hits.length){ box.classList.remove("open"); return; }
  box.innerHTML = hits.map(p =>
    `<button onclick="selectSku('${p.sku}')"><span class="sku">${p.sku}</span>${p.desc||""}</button>`
  ).join("");
  box.classList.add("open");
}

function selectSku(sku){
  current = DB.find(p => p.sku === sku) || null;
  document.getElementById("suggestions").classList.remove("open");
  document.getElementById("searchInput").value = current ? `${current.sku} — ${current.desc}` : sku;
  render();
}

function daysLeft(dateStr){
  if(!dateStr) return null;
  const [y,m,d] = dateStr.split("-").map(Number);
  const venc = new Date(y, m-1, d);
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.round((venc - hoy) / 86400000);
}

function render(){
  const cont = document.getElementById("result");
  const empty = document.getElementById("emptyState");
  if(!current){ cont.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";

  // Conserva la fecha si ya había una escrita
  const prevFecha = document.getElementById("fechaVenc") ? document.getElementById("fechaVenc").value : "";

  const canalesHtml = CHANNELS.map(c => {
    const req = current.canales[c];
    return `<div class="canal">
      <div class="name">${c}</div>
      <div class="req">mín. requerido<b class="num">${req===null?"—":req+" días"}</b></div>
      <span class="badge na" data-req="${req===null?"":req}">—</span>
    </div>`;
  }).join("");

  cont.innerHTML = `
    <div class="card">
      <div class="prod-sku num">${current.sku}</div>
      <div class="prod-desc">${current.desc || "Sin descripción"}</div>
      <div class="prod-meta">
        ${current.vida !== null ? `<div class="chip">Vida útil total<b class="num">${current.vida} días</b></div>` : ""}
        <div class="chip">Canales configurados<b class="num">${CHANNELS.length}</b></div>
      </div>
    </div>

    <div class="card">
      <h2>Vencimiento del lote</h2>
      <div class="date-row">
        <div class="date-field">
          <label for="fechaVenc">Fecha de vencimiento</label>
          <input type="date" id="fechaVenc" value="${prevFecha}">
        </div>
        <div class="days-left" id="daysCard">
          <div class="n num" id="daysNum">—</div>
          <div class="l" id="daysLabel">Días restantes</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Tiempo máximo de despacho por canal</h2>
      ${canalesHtml}
      <div class="hint" id="calcHint">Ingresa la fecha de vencimiento para evaluar si el lote es apto por canal.</div>
    </div>`;

  // El input se crea UNA sola vez; escribir la fecha no reconstruye la pantalla
  const fechaEl = document.getElementById("fechaVenc");
  fechaEl.addEventListener("input", updateCalc);
  fechaEl.addEventListener("change", updateCalc);
  updateCalc();
}

function updateCalc(){
  const fechaEl = document.getElementById("fechaVenc");
  if(!fechaEl) return;
  const dl = daysLeft(fechaEl.value);

  const card = document.getElementById("daysCard");
  const num = document.getElementById("daysNum");
  const lbl = document.getElementById("daysLabel");
  const hint = document.getElementById("calcHint");

  if(dl === null){
    card.className = "days-left";
    num.textContent = "—";
    lbl.textContent = "Días restantes";
    hint.textContent = "Ingresa la fecha de vencimiento para evaluar si el lote es apto por canal.";
  } else {
    card.className = "days-left " + (dl <= 0 ? "bad" : "ok");
    num.textContent = dl;
    lbl.textContent = dl < 0 ? "Vencido" : (dl === 0 ? "Vence hoy" : "Días restantes");
    hint.textContent = "APTO: los días restantes cubren el mínimo de vida útil exigido por el canal.";
  }

  document.querySelectorAll(".canal .badge").forEach(b => {
    const req = b.dataset.req === "" ? null : parseFloat(b.dataset.req);
    if(req === null){
      b.className = "badge na"; b.textContent = "SIN DATO";
    } else if(dl === null){
      b.className = "badge na"; b.textContent = "—";
    } else if(dl >= req){
      b.className = "badge apto"; b.textContent = "✓ APTO";
    } else {
      b.className = "badge noapto"; b.textContent = "✕ NO APTO";
    }
  });
}

document.addEventListener("click", e => {
  if(!e.target.closest(".search-box")) document.getElementById("suggestions").classList.remove("open");
});

loadData();
</script>
</body>
</html>
